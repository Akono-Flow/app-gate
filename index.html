<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MyApp</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(20,184,166,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20,184,166,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: -40%; left: -20%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(20,184,166,.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: .7; }
      50%      { transform: scale(1.1); opacity: 1; }
    }

    .auth-wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 1rem;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo h1 {
      font-family: var(--mono);
      font-size: 1.75rem;
      color: var(--accent);
      letter-spacing: .1em;
    }
    .auth-logo p {
      font-size: .875rem;
      color: var(--text-muted);
      margin-top: .25rem;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    /* Tab switcher */
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .auth-tab {
      flex: 1;
      padding: .9rem;
      background: none;
      border: none;
      font-family: var(--sans);
      font-size: .9rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: color .2s, background .2s;
      position: relative;
    }
    .auth-tab::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform .25s;
    }
    .auth-tab.active {
      color: var(--accent);
      background: rgba(20,184,166,.05);
    }
    .auth-tab.active::after { transform: scaleX(1); }

    .auth-form { padding: 1.75rem; display: flex; flex-direction: column; gap: 1.1rem; }
    .auth-form.hidden { display: none; }

    .auth-divider {
      display: flex; align-items: center; gap: .75rem;
      color: var(--text-muted); font-size: .8rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    .reason-banner {
      display: none;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5;
      border-radius: var(--radius);
      padding: .75rem 1rem;
      font-size: .875rem;
      gap: .5rem;
      align-items: flex-start;
    }
    .reason-banner.show { display: flex; }

    .pending-notice {
      background: rgba(234,179,8,.08);
      border: 1px solid rgba(234,179,8,.25);
      color: #fde047;
      border-radius: var(--radius);
      padding: .85rem 1rem;
      font-size: .875rem;
      text-align: center;
      display: none;
    }
    .pending-notice.show { display: block; }

    .auth-footer {
      text-align: center;
      padding: 1rem 1.75rem;
      border-top: 1px solid var(--border);
      font-size: .8125rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-logo">
      <h1 id="logo-name">MYAPP</h1>
      <p>Secure access portal</p>
    </div>

    <div class="auth-card">
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab"        id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Error / reason banner -->
      <div id="reason-banner" class="reason-banner" style="margin: 1rem 1.75rem 0; display:none;">
        <span>⚠</span>
        <span id="reason-text"></span>
      </div>

      <!-- LOGIN FORM -->
      <form class="auth-form" id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email address</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">
            Password
            <a href="#" style="float:right; font-size:.8rem;" onclick="handleForgot(event)">Forgot?</a>
          </label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="btn-login">
          Sign In
        </button>

        <div id="pending-notice" class="pending-notice">
          ✅ Account created! An admin must activate your account before you can sign in.
        </div>
      </form>

      <!-- SIGNUP FORM -->
      <form class="auth-form hidden" id="form-signup" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label for="signup-name">Full name</label>
          <input type="text" id="signup-name" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label for="signup-email">Email address</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="signup-confirm">Confirm password</label>
          <input type="password" id="signup-confirm" placeholder="Repeat password" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="btn-signup">
          Create Account
        </button>

        <p style="font-size:.8125rem; color: var(--text-muted); text-align:center;">
          New accounts require admin approval before you can sign in.
        </p>
      </form>

      <div class="auth-footer">
        Protected by Supabase Auth · &copy; <span id="year"></span>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // ── Init ──────────────────────────────────────────────────
    document.getElementById('logo-name').textContent = APP_NAME.toUpperCase();
    document.title = `Login — ${APP_NAME}`;
    document.getElementById('year').textContent = new Date().getFullYear();

    // Show reason banner from URL param
    const params = new URLSearchParams(location.search);
    const reason = params.get('reason');
    if (reason) {
      const banner = document.getElementById('reason-banner');
      const text   = document.getElementById('reason-text');
      const msgs   = {
        inactive:  'Your account has been deactivated. Please contact an administrator.',
        forbidden: 'You do not have permission to access that page.',
        timeout:   'Your session expired. Please sign in again.',
      };
      text.textContent = msgs[reason] || 'Access denied.';
      banner.style.display = 'flex';
    }

    // Redirect if already logged in and active
    (async () => {
      const { session, profile } = await getSessionAndProfile();
      if (session && profile && profile.is_active) {
        location.href = profile.role === 'admin' ? 'admin.html' : 'app.html';
      }
    })();

    // ── Tab switcher ─────────────────────────────────────────
    function switchTab(tab) {
      document.getElementById('form-login').classList.toggle('hidden',  tab !== 'login');
      document.getElementById('form-signup').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('tab-login').classList.toggle('active',   tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active',  tab === 'signup');
      document.getElementById('reason-banner').style.display = 'none';
    }

    // ── Login ─────────────────────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      const btn   = document.getElementById('btn-login');
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="sb-spinner"></span> Signing in…';

      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

      if (error) {
        showToast(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      // Check active status
      const { data: profile } = await sb.from('profiles').select('*').eq('id', data.user.id).single();

      if (!profile || !profile.is_active) {
        await sb.auth.signOut();
        showToast('Your account is not yet active. Contact an admin.', 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      showToast('Signed in!', 'success');
      setTimeout(() => {
        location.href = profile.role === 'admin' ? 'admin.html' : 'app.html';
      }, 600);
    }

    // ── Sign Up ───────────────────────────────────────────────
    async function handleSignup(e) {
      e.preventDefault();
      const btn  = document.getElementById('btn-signup');
      const name = document.getElementById('signup-name').value.trim();
      const email= document.getElementById('signup-email').value.trim();
      const pass = document.getElementById('signup-password').value;
      const conf = document.getElementById('signup-confirm').value;

      if (pass !== conf) { showToast('Passwords do not match', 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="sb-spinner"></span> Creating account…';

      const { error } = await sb.auth.signUp({
        email, password: pass,
        options: { data: { full_name: name } }
      });

      if (error) {
        showToast(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }

      btn.disabled = false;
      btn.textContent = 'Create Account';

      document.getElementById('form-signup').reset();
      switchTab('login');
      document.getElementById('pending-notice').classList.add('show');
    }

    // ── Forgot password ───────────────────────────────────────
    async function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      if (!email) { showToast('Enter your email first', 'warn'); return; }

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: location.origin + location.pathname.replace('index.html','') + 'reset-password.html'
      });

      if (error) showToast(error.message, 'error');
      else        showToast('Password reset email sent!', 'success');
    }
  </script>
</body>
</html>
