<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — MyApp</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(20,184,166,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20,184,166,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .reset-wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px; padding: 1rem;
      animation: fadeUp .4s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .reset-logo {
      text-align:center; margin-bottom: 1.5rem;
      font-family: var(--mono); font-size: 1.5rem;
      color: var(--accent); letter-spacing: .1em;
    }
    .reset-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
    }
    .reset-card h2 {
      font-size: 1.1rem; margin-bottom: .5rem;
    }
    .reset-card p {
      color: var(--text-muted); font-size: .875rem; margin-bottom: 1.5rem;
    }
    .form-stack { display: flex; flex-direction: column; gap: 1rem; }
  </style>
</head>
<body>
  <div class="reset-wrapper">
    <div class="reset-logo" id="reset-logo">MYAPP</div>
    <div class="reset-card">
      <h2>Set New Password</h2>
      <p>Enter your new password below.</p>
      <div class="form-stack">
        <div class="form-group">
          <label for="new-pass">New password</label>
          <input type="password" id="new-pass" placeholder="Min. 8 characters" minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="new-pass-confirm">Confirm password</label>
          <input type="password" id="new-pass-confirm" placeholder="Repeat password" autocomplete="new-password">
        </div>
        <button class="btn btn-primary btn-full" id="btn-reset" onclick="handleReset()">
          Update Password
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('reset-logo').textContent = APP_NAME.toUpperCase();
    document.title = `Reset Password — ${APP_NAME}`;

    async function handleReset() {
      const p1  = document.getElementById('new-pass').value;
      const p2  = document.getElementById('new-pass-confirm').value;
      const btn = document.getElementById('btn-reset');

      if (p1 !== p2) { showToast('Passwords do not match', 'error'); return; }
      if (p1.length < 8) { showToast('Password too short', 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="sb-spinner"></span> Updating…';

      const { error } = await sb.auth.updateUser({ password: p1 });
      if (error) {
        showToast(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Update Password';
        return;
      }

      showToast('Password updated! Redirecting…', 'success');
      setTimeout(() => { location.href = 'index.html'; }, 1500);
    }
  </script>
</body>
</html>
